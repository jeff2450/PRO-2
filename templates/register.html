{% extends "base.html" %}

{% block content %}
<section class="auth-layout">
    <div class="auth-copy">
        <p class="eyebrow">Start learning</p>
        <h1>Register</h1>
        <p>Create a learner account and move into the student dashboard.</p>
        <div class="auth-metrics">
            <article><strong>2,400+</strong><span>Students</span></article>
            <article><strong>91%</strong><span>Pass rate</span></article>
        </div>
    </div>
    <form method="post" class="form-card">
        {% if next_path %}
            <input type="hidden" name="next" value="{{ next_path }}">
        {% endif %}
        <label>Full name <input name="fullname" required></label>
        <label>Email <input type="email" name="email" required></label>
        <label>Password <input type="password" name="password" required></label>
        <button class="button" type="submit">Create Account</button>
        <a class="text-link" href="{{ url_for('login', next=next_path) if next_path else url_for('login') }}">Already have an account? Login</a>
    </form>
</section>
{% endblock %}
