{% extends "base.html" %}
{% from "macros.html" import student_shell with context %}

{% block content %}
{% call student_shell(title) %}
    <form method="post" class="form-card inline-form">
        {% if submitted %}
            <div class="notice">Profile saved successfully.</div>
        {% endif %}
        <label>Full name <input name="fullname" value="{{ session.get('user_name', '') or current_user_name }}"></label>
        <label>Email <input type="email" name="email" value="{{ session.get('user_email', '') or 'student@example.com' }}"></label>
        <label>Exam focus
            <select name="exam_focus">
                <option {% if session.get('exam_focus') == 'NECTA' %}selected{% endif %}>NECTA</option>
                <option {% if session.get('exam_focus') == 'KCSE' %}selected{% endif %}>KCSE</option>
            </select>
        </label>
        <button class="button" type="submit">Save Profile</button>
    </form>
{% endcall %}
{% endblock %}
